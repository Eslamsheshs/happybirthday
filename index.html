<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد 🎂</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Dancing+Script:wght@700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f0020 0%,#1e0040 50%,#0f0020 100%);
  font-family:'Tajawal',sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}

/* ── STARS ── */
.star{position:fixed;border-radius:50%;background:#fff;animation:twinkle 2s infinite alternate;pointer-events:none}
@keyframes twinkle{from{opacity:.15;transform:scale(.7)}to{opacity:1;transform:scale(1.2)}}

/* ── CONFETTI ── */
.piece{position:fixed;top:-20px;border-radius:2px;animation:drop linear infinite;pointer-events:none}
@keyframes drop{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.2}}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  width:460px;max-width:96vw;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:36px;
  padding:36px 30px 28px;
  text-align:center;
  animation:rise .9s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes rise{from{opacity:0;transform:scale(.7) translateY(50px)}to{opacity:1;transform:none}}
.card::before{
  content:'';position:absolute;inset:-2px;border-radius:38px;z-index:-1;
  background:linear-gradient(135deg,#ff6ec7,#a855f7,#60a5fa,#ff6ec7);
  background-size:300% 300%;
  animation:glow 3s linear infinite;opacity:.75;
}
@keyframes glow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── PHOTO ── */
.photo-wrap{position:relative;width:180px;height:180px;margin:0 auto 18px;cursor:pointer}
.photo-ring{position:absolute;inset:-4px;border-radius:50%;background:linear-gradient(135deg,#ff6ec7,#a855f7,#60a5fa);background-size:200% 200%;animation:glow 2s linear infinite}
.photo-inner{position:relative;z-index:1;width:180px;height:180px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,.15);background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.photo-inner span{font-size:11px;color:rgba(255,255,255,.75)}
.photo-inner svg{width:28px;height:28px;stroke:rgba(255,255,255,.8);fill:none;stroke-width:1.5}
.photo-wrap:hover .photo-inner{filter:brightness(1.15)}
#photoIn{display:none}

/* ── NAME ── */
.name-wrap{margin-bottom:4px}
.name-lbl{font-size:22px;font-weight:900;color:#fff;cursor:pointer;text-shadow:0 0 18px rgba(192,132,252,.9);transition:opacity .2s;min-height:30px}
.name-lbl:hover{opacity:.75}
.name-in{display:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:12px;color:#fff;font-family:'Tajawal',sans-serif;font-size:16px;padding:7px 16px;width:80%;text-align:center;outline:none}
.name-in::placeholder{color:rgba(255,255,255,.35)}

/* ── NUMBER 17 ── */
.num17{
  font-family:'Dancing Script',cursive;font-size:80px;font-weight:700;line-height:1;
  background:linear-gradient(135deg,#ff6ec7,#c084fc,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 14px rgba(192,132,252,.7));
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.sub17{font-size:15px;color:rgba(255,255,255,.6);margin-bottom:18px;letter-spacing:1px}

.div{width:50px;height:2px;background:linear-gradient(90deg,transparent,#c084fc,transparent);margin:0 auto 18px;border-radius:1px}

/* ── CAKE SCENE ── */
.cake-scene{height:170px;position:relative;display:flex;align-items:flex-end;justify-content:center;margin-bottom:18px}

/* plate */
.plate{
  position:absolute;bottom:0;
  width:170px;height:12px;border-radius:50%;
  background:linear-gradient(180deg,#c084fc 0%,#7c3aed 100%);
  box-shadow:0 4px 12px rgba(168,85,247,.5);
  opacity:0;transform:scaleX(0);
  transition:opacity .4s,transform .5s cubic-bezier(.34,1.56,.64,1);
}
.plate.show{opacity:1;transform:scaleX(1)}

/* bottom tier */
.tier-bot{
  position:absolute;bottom:10px;
  width:150px;height:55px;border-radius:14px 14px 8px 8px;
  background:linear-gradient(180deg,#fde68a 0%,#f59e0b 100%);
  box-shadow:0 6px 20px rgba(245,158,11,.4);
  opacity:0;transform:translateY(30px);
  transition:opacity .5s,transform .6s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
.tier-bot.show{opacity:1;transform:translateY(0)}
.tier-bot::after{content:'';position:absolute;bottom:0;left:0;right:0;height:14px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.25) 0,rgba(255,255,255,.25) 8px,transparent 8px,transparent 16px)}

/* cream bot */
.cream-bot{
  position:absolute;bottom:63px;
  width:158px;
  opacity:0;transform:scaleY(0);transform-origin:bottom;
  transition:opacity .4s,transform .5s cubic-bezier(.34,1.56,.64,1);
}
.cream-bot.show{opacity:1;transform:scaleY(1)}
.cream-bot svg{width:100%;display:block}

/* mid tier */
.tier-mid{
  position:absolute;bottom:78px;
  width:118px;height:42px;border-radius:10px 10px 6px 6px;
  background:linear-gradient(180deg,#f9a8d4 0%,#ec4899 100%);
  box-shadow:0 6px 16px rgba(236,72,153,.4);
  opacity:0;transform:translateY(24px);
  transition:opacity .5s,transform .6s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
.tier-mid.show{opacity:1;transform:translateY(0)}
.tier-mid::after{content:'';position:absolute;bottom:0;left:0;right:0;height:10px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.25) 0,rgba(255,255,255,.25) 6px,transparent 6px,transparent 12px)}

/* cream mid */
.cream-mid{
  position:absolute;bottom:118px;
  width:126px;
  opacity:0;transform:scaleY(0);transform-origin:bottom;
  transition:opacity .4s,transform .5s cubic-bezier(.34,1.56,.64,1);
}
.cream-mid.show{opacity:1;transform:scaleY(1)}
.cream-mid svg{width:100%;display:block}

/* top tier */
.tier-top{
  position:absolute;bottom:128px;
  width:84px;height:34px;border-radius:8px 8px 5px 5px;
  background:linear-gradient(180deg,#86efac 0%,#22c55e 100%);
  box-shadow:0 6px 14px rgba(34,197,94,.4);
  opacity:0;transform:translateY(20px);
  transition:opacity .5s,transform .6s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
.tier-top.show{opacity:1;transform:translateY(0)}
.tier-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:8px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.25) 0,rgba(255,255,255,.25) 4px,transparent 4px,transparent 8px)}

/* candles */
.candles{
  position:absolute;bottom:162px;
  display:flex;gap:10px;
  opacity:0;transform:translateY(14px);
  transition:opacity .4s,transform .5s cubic-bezier(.34,1.56,.64,1);
}
.candles.show{opacity:1;transform:translateY(0)}
.candle{display:flex;flex-direction:column;align-items:center;gap:0}
.candle-body{width:8px;height:20px;border-radius:3px}
.flame{width:10px;height:14px;position:relative;animation:flicker 0.5s ease-in-out infinite alternate}
.flame svg{width:10px;height:14px}
@keyframes flicker{0%{transform:scaleX(1) scaleY(1) rotate(-2deg)}100%{transform:scaleX(.85) scaleY(1.1) rotate(2deg)}}

/* ── MESSAGE ── */
.msg{font-size:13.5px;color:rgba(255,255,255,.82);line-height:1.95;margin-bottom:20px}
.msg em{color:#f0abfc;font-style:normal;font-weight:700}

/* ── BUTTONS ── */
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.btn{
  background:linear-gradient(135deg,#a855f7,#ec4899);border:none;border-radius:50px;
  color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;
  padding:11px 22px;cursor:pointer;
  box-shadow:0 4px 18px rgba(168,85,247,.45);
  transition:transform .18s,box-shadow .18s;white-space:nowrap;
}
.btn:hover{transform:scale(1.06);box-shadow:0 6px 26px rgba(168,85,247,.65)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.25);box-shadow:none}
.btn.ghost:hover{background:rgba(255,255,255,.08)}

/* ── UPLOAD PANELS ── */
.panels{display:flex;gap:10px;margin-bottom:10px}
.panel{
  flex:1;background:rgba(255,255,255,.06);border:1px dashed rgba(255,255,255,.22);
  border-radius:16px;padding:12px 8px;cursor:pointer;transition:background .2s,border-color .2s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
}
.panel:hover{background:rgba(168,85,247,.15);border-color:#a855f7}
.panel svg{width:22px;height:22px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:1.5}
.panel span{font-size:11.5px;color:rgba(255,255,255,.55);text-align:center}
.panel .status{font-size:10.5px;color:#c084fc;min-height:14px}
#soundIn{display:none}

/* ── VOLUME ── */
.vol-row{display:flex;align-items:center;gap:10px;direction:rtl;margin-bottom:4px}
.vol-row label{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}
.vol-row input{flex:1;accent-color:#a855f7}
.vol-val{font-size:12px;color:#c084fc;min-width:32px;text-align:center}

.hint{font-size:10.5px;color:rgba(255,255,255,.28);margin-top:6px}

/* ── BALLOONS ── */
.balloon{position:fixed;font-size:38px;animation:float linear infinite;pointer-events:none;z-index:3}
@keyframes float{from{transform:translateY(0) rotate(-4deg);opacity:.9}to{transform:translateY(-115vh) rotate(4deg);opacity:0}}

/* sparkle */
.sp{position:absolute;pointer-events:none;animation:sp 2s ease-in-out infinite;font-size:16px}
@keyframes sp{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1.3)}}
</style>
</head>
<body>

<div id="starsEl"></div>
<div id="confEl"></div>
<div id="ballEl"></div>

<div class="card">
  <span class="sp" style="top:-8px;left:18px;animation-delay:0s">✨</span>
  <span class="sp" style="top:-8px;right:18px;animation-delay:.6s">✨</span>
  <span class="sp" style="bottom:18px;left:-8px;animation-delay:1.1s">⭐</span>
  <span class="sp" style="bottom:18px;right:-8px;animation-delay:1.7s">⭐</span>

  

  <div class="photo-wrap">
    <div class="photo-ring"></div>
    <div class="photo-inner" id="photoInner">
    <img src="image.jpeg" style="width:100%; height:100%; object-fit:cover;">
    </div>
  </div>

  <!-- NAME -->
  <div class="name-wrap">
    <div class="name-lbl" id="nameLbl" onclick="startEditName()">عبد الله</div>
    <input class="name-in" id="nameIn" type="text" placeholder="اكتب الاسم هنا…" onblur="saveName()" onkeydown="if(event.key==='Enter')saveName()">
  </div>

  <!-- 17 -->
  <div class="num17">17</div>
  <div class="sub17">كل سنه وانت طيب يا زميلي</div>
  <div class="div"></div>

  <!-- CAKE -->
  <div class="cake-scene" id="cakeScene">
    <div class="plate" id="lPlate"></div>

    <div class="tier-bot" id="lBot"></div>

    <!-- cream bot: wavy SVG -->
    <div class="cream-bot" id="lCreamBot">
      <svg viewBox="0 0 158 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 18 Q10 0 20 10 Q30 20 40 8 Q50 0 60 10 Q70 20 80 8 Q90 0 100 10 Q110 20 120 8 Q130 0 140 10 Q150 20 158 10 L158 18 Z" fill="#fff" opacity=".92"/>
      </svg>
    </div>

    <div class="tier-mid" id="lMid"></div>

    <div class="cream-mid" id="lCreamMid">
      <svg viewBox="0 0 126 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 16 Q8 0 16 8 Q24 16 32 6 Q40 0 48 8 Q56 16 64 6 Q72 0 80 8 Q88 16 96 6 Q104 0 112 8 Q120 16 126 8 L126 16 Z" fill="#fff" opacity=".92"/>
      </svg>
    </div>

    <div class="tier-top" id="lTop"></div>

    <!-- candles -->
    <div class="candles" id="lCandles">
      <div class="candle">
        <div class="flame"><svg viewBox="0 0 10 14"><ellipse cx="5" cy="9" rx="4" ry="5" fill="#fbbf24"/><ellipse cx="5" cy="7" rx="2.5" ry="3.5" fill="#fff7"/></svg></div>
        <div class="candle-body" style="background:linear-gradient(180deg,#f472b6,#db2777)"></div>
      </div>
      <div class="candle">
        <div class="flame"><svg viewBox="0 0 10 14"><ellipse cx="5" cy="9" rx="4" ry="5" fill="#fb923c"/><ellipse cx="5" cy="7" rx="2.5" ry="3.5" fill="#fff7"/></svg></div>
        <div class="candle-body" style="background:linear-gradient(180deg,#a78bfa,#7c3aed)"></div>
      </div>
      <div class="candle">
        <div class="flame"><svg viewBox="0 0 10 14"><ellipse cx="5" cy="9" rx="4" ry="5" fill="#fbbf24"/><ellipse cx="5" cy="7" rx="2.5" ry="3.5" fill="#fff7"/></svg></div>
        <div class="candle-body" style="background:linear-gradient(180deg,#34d399,#059669)"></div>
      </div>
    </div>
  </div>

  <!-- MESSAGE -->
  <p class="msg">
    كل سنة وانت طيب يا <em id="nameInMsg"></em> 🎉<br>
    ربنا يكمل عليك بالصحة والسعادة<br>
    ويحقق كل أحلامك وأمانيك ✨<br>
    <em>عقبال المية وانت بخير!</em>
  </p>

  <!-- BUTTONS -->
  <div class="btns">
    <button class="btn" onclick="celebrate()">🎊 احتفل!</button>
      <button class="btn" onclick="togglePlay()">🎵 /تشغيل </button>

  </div>
</div>

<script>
  let audioEl = new Audio("aud.aac");
audioEl.volume = 0.75;
let isPlaying = false;

function togglePlay(){
  if(isPlaying){
    audioEl.pause();
    isPlaying=false;
  } else {
    audioEl.play();
    isPlaying=true;
  }
}

/* ── STARS ── */
const starsEl = document.getElementById('starsEl');
for(let i=0;i<90;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*3+.8;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${Math.random()*2+1.2}s;z-index:0`;
  starsEl.appendChild(s);
}

/* ── CONFETTI ── */
const confEl=document.getElementById('confEl');
const COLORS=['#ff6ec7','#a855f7','#60a5fa','#fbbf24','#34d399','#f87171','#c084fc','#fb923c'];
function spawnConfetti(n,fast){
  for(let i=0;i<n;i++){
    const c=document.createElement('div');c.className='piece';
    const dur=fast?Math.random()*1.8+1.2:Math.random()*4+3.5;
    c.style.cssText=`left:${Math.random()*100}%;background:${COLORS[~~(Math.random()*COLORS.length)]};width:${Math.random()*9+5}px;height:${Math.random()*11+7}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${dur}s;animation-delay:${Math.random()*(fast?.25:5)}s;z-index:2`;
    confEl.appendChild(c);
    if(fast)setTimeout(()=>c.remove(),(dur+.5)*1000);
  }
}
spawnConfetti(55,false);

/* ── BALLOONS ── */
const ballEl=document.getElementById('ballEl');
['🎈','🎈','🎉','🎊','🎈','🎈','🎉'].forEach((b,i)=>{
  const el=document.createElement('div');el.className='balloon';el.textContent=b;
  el.style.cssText=`animation-duration:${Math.random()*4+6}s;animation-delay:${i*1.3}s;left:${10+i*13}%;bottom:-80px`;
  ballEl.appendChild(el);
});
function burstBalloons(){
  for(let j=0;j<5;j++){
    const b=document.createElement('div');b.className='balloon';
    b.textContent=['🎈','🎉','🎊','⭐','✨'][j];
    b.style.cssText=`animation-duration:${Math.random()*3+3}s;animation-delay:${j*.2}s;left:${Math.random()*85+5}%;bottom:-80px;z-index:3`;
    ballEl.appendChild(b);setTimeout(()=>b.remove(),7000);
  }
}

/* ── CAKE BUILD ── */
const steps=[
  ()=>show('lPlate'),
  ()=>show('lBot'),
  ()=>show('lCreamBot'),
  ()=>show('lMid'),
  ()=>show('lCreamMid'),
  ()=>show('lTop'),
  ()=>show('lCandles'),
];
function show(id){document.getElementById(id).classList.add('show')}
let stepIdx=0;
function buildCake(){
  if(stepIdx<steps.length){steps[stepIdx]();stepIdx++;setTimeout(buildCake,320);}
}
setTimeout(buildCake,600);



/* ── NAME ── */
function startEditName(){
  const l=document.getElementById('nameLbl'),i=document.getElementById('nameIn');
  i.value=l.textContent;l.style.display='none';i.style.display='block';i.focus();
}
function saveName(){
  const l=document.getElementById('nameLbl'),i=document.getElementById('nameIn');
  const name=i.value.trim()||'محمد';
  l.textContent=name;document.getElementById('nameInMsg').textContent=name;
  i.style.display='none';l.style.display='block';
}

/* ── AUDIO ── */

/* ── CELEBRATE ── */
function celebrate(){
  spawnConfetti(35,true);
  burstBalloons();
  if(audioEl&&!isPlaying){audioEl.currentTime=0;audioEl.play();isPlaying=true;document.getElementById('playBtn').textContent='⏹ إيقاف';}
}
// تفعيل رفع الصورة من الـ Panel


</script>
</body>
</html>
